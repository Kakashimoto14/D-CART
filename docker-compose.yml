services:
  postgres:
    image: postgres:16-alpine
    container_name: dcart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dcart_db}
      POSTGRES_USER: ${POSTGRES_USER:-dcart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dcart_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: dcart-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: dcart-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-dcart}:${POSTGRES_PASSWORD:-dcart_pass}@postgres:5432/${POSTGRES_DB:-dcart_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-replace_with_long_random_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-14}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-dcart_refresh_token}
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-false}
      REDIS_URL: redis://redis:6379
      INVENTORY_RESERVATION_TTL_MINUTES: ${INVENTORY_RESERVATION_TTL_MINUTES:-15}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      FRONTEND_URLS: ${FRONTEND_URLS:-http://localhost:8080}
      PASSWORD_RESET_TTL_MINUTES: ${PASSWORD_RESET_TTL_MINUTES:-60}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@dcart.local}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      PAYMONGO_SECRET_KEY: ${PAYMONGO_SECRET_KEY:-}
      PAYMONGO_PUBLIC_KEY: ${PAYMONGO_PUBLIC_KEY:-}
      PAYMONGO_WEBHOOK_SECRET: ${PAYMONGO_WEBHOOK_SECRET:-}
      PAYMONGO_API_BASE_URL: ${PAYMONGO_API_BASE_URL:-https://api.paymongo.com}
      CHECKOUT_SUCCESS_URL: ${CHECKOUT_SUCCESS_URL:-http://localhost:8080/payment/success}
      CHECKOUT_CANCEL_URL: ${CHECKOUT_CANCEL_URL:-http://localhost:8080/payment/cancelled}
      STORE_UTC_OFFSET_MINUTES: ${STORE_UTC_OFFSET_MINUTES:-480}
      SAME_DAY_CUTOFF_HOUR: ${SAME_DAY_CUTOFF_HOUR:-17}
      SAME_DAY_SLOT_CUTOFF_MINUTES: ${SAME_DAY_SLOT_CUTOFF_MINUTES:-90}
      STANDARD_LEAD_DAYS: ${STANDARD_LEAD_DAYS:-1}
      SAME_DAY_SURCHARGE: ${SAME_DAY_SURCHARGE:-35}
      SCHEDULED_WINDOW_SURCHARGE: ${SCHEDULED_WINDOW_SURCHARGE:-12}
      SMALL_ORDER_THRESHOLD: ${SMALL_ORDER_THRESHOLD:-800}
      SMALL_ORDER_SURCHARGE: ${SMALL_ORDER_SURCHARGE:-20}
      FREE_DELIVERY_THRESHOLD: ${FREE_DELIVERY_THRESHOLD:-2500}
      ADMIN_NAME: ${ADMIN_NAME:-Store Admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@dcart.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
    ports:
      - "5000:5000"
    command: >
      sh -c "npx prisma migrate deploy &&
      node prisma/seed.js &&
      node src/server.js"

  worker:
    build:
      context: ./backend
    container_name: dcart-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-dcart}:${POSTGRES_PASSWORD:-dcart_pass}@postgres:5432/${POSTGRES_DB:-dcart_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-replace_with_long_random_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-14}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-dcart_refresh_token}
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-false}
      REDIS_URL: redis://redis:6379
      INVENTORY_RESERVATION_TTL_MINUTES: ${INVENTORY_RESERVATION_TTL_MINUTES:-15}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      FRONTEND_URLS: ${FRONTEND_URLS:-http://localhost:8080}
      PASSWORD_RESET_TTL_MINUTES: ${PASSWORD_RESET_TTL_MINUTES:-60}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@dcart.local}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      PAYMONGO_SECRET_KEY: ${PAYMONGO_SECRET_KEY:-}
      PAYMONGO_PUBLIC_KEY: ${PAYMONGO_PUBLIC_KEY:-}
      PAYMONGO_WEBHOOK_SECRET: ${PAYMONGO_WEBHOOK_SECRET:-}
      PAYMONGO_API_BASE_URL: ${PAYMONGO_API_BASE_URL:-https://api.paymongo.com}
      CHECKOUT_SUCCESS_URL: ${CHECKOUT_SUCCESS_URL:-http://localhost:8080/payment/success}
      CHECKOUT_CANCEL_URL: ${CHECKOUT_CANCEL_URL:-http://localhost:8080/payment/cancelled}
      STORE_UTC_OFFSET_MINUTES: ${STORE_UTC_OFFSET_MINUTES:-480}
      SAME_DAY_CUTOFF_HOUR: ${SAME_DAY_CUTOFF_HOUR:-17}
      SAME_DAY_SLOT_CUTOFF_MINUTES: ${SAME_DAY_SLOT_CUTOFF_MINUTES:-90}
      STANDARD_LEAD_DAYS: ${STANDARD_LEAD_DAYS:-1}
      SAME_DAY_SURCHARGE: ${SAME_DAY_SURCHARGE:-35}
      SCHEDULED_WINDOW_SURCHARGE: ${SCHEDULED_WINDOW_SURCHARGE:-12}
      SMALL_ORDER_THRESHOLD: ${SMALL_ORDER_THRESHOLD:-800}
      SMALL_ORDER_SURCHARGE: ${SMALL_ORDER_SURCHARGE:-20}
      FREE_DELIVERY_THRESHOLD: ${FREE_DELIVERY_THRESHOLD:-2500}
    command: ["node", "src/worker.js"]

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: dcart-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  redis_data:
